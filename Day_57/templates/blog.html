<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog</title>
</head>
<body>
<!--using a python code in html with more than one line-->
  {% for blog_post in posts: %}
    <h1>{{ blog_post["title"] }}</h1>
    <h2>{{ blog_post["subtitle"] }}</h2>
<!--endfor statement ends the loop-->
  {% endfor %}


</body>
</html>
